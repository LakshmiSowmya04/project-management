<!DOCTYPE html>
<html>
<head>
  <title>Pentest Resource Planner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      color: #222;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px #ddd;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #2563eb;
      color: white;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #111827;
      color: white;
    }

    .AVAILABLE {
      color: green;
      font-weight: bold;
    }

    .BUSY {
      color: orange;
      font-weight: bold;
    }

    .COMPLETING_TODAY {
      color: blue;
      font-weight: bold;
    }

    .ON_LEAVE {
      color: red;
      font-weight: bold;
    }

    .RESERVED {
      color: purple;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Pentest Resource Planner</h1>

  <div class="card">
    <h2>Add Engineer</h2>
    <input id="name" placeholder="Engineer Name">
    <input id="skills" placeholder="Skills e.g. Web, API, Cloud">
    <button onclick="addEngineer()">Add</button>
  </div>

  <div class="card">
    <h2>Assign Project</h2>
    <input id="assignId" placeholder="Engineer ID">
    <input id="projectName" placeholder="Project Name">
    <input id="pmName" placeholder="Project Manager">
    <input id="leadName" placeholder="Lead Name">
    <input id="startDate" type="date">
    <input id="endDate" type="date">
    <button onclick="assignProject()">Assign</button>
  </div>

  <div class="card">
    <h2>Mark Leave</h2>
    <input id="leaveId" placeholder="Engineer ID">
    <input id="leaveFrom" type="date">
    <input id="leaveTo" type="date">
    <button onclick="markLeave()">Save Leave</button>
  </div>

  <div class="card">
    <h2>Available Queue</h2>
    <button onclick="loadQueue()">Refresh Queue</button>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Engineer</th>
          <th>Skills</th>
          <th>Status</th>
          <th>Reason</th>
        </tr>
      </thead>
      <tbody id="queueTable"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>All Engineers</h2>
    <button onclick="loadEngineers()">Refresh Engineers</button>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Engineer</th>
          <th>Skills</th>
          <th>Project</th>
          <th>PM</th>
          <th>Lead</th>
          <th>Start</th>
          <th>End</th>
          <th>Leave</th>
          <th>Status</th>
          <th>Reason</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="engineerTable"></tbody>
    </table>
  </div>

<script>
async function loadEngineers() {
  const res = await fetch("/api/engineers");
  const engineers = await res.json();

  const table = document.getElementById("engineerTable");
  table.innerHTML = "";

  engineers.forEach(e => {
    table.innerHTML += `
      <tr>
        <td>${e.id}</td>
        <td>${e.name}</td>
        <td>${e.skills}</td>
        <td>${e.projectName || "-"}</td>
        <td>${e.pmName || "-"}</td>
        <td>${e.leadName || "-"}</td>
        <td>${e.startDate || "-"}</td>
        <td>${e.endDate || "-"}</td>
        <td>${e.leaveFrom ? e.leaveFrom + " to " + e.leaveTo : "-"}</td>
        <td class="${e.status}">${e.status}</td>
        <td>${e.reason}</td>
        <td>
          <button onclick="clearProject('${e.id}')">Clear Project</button>
          <button onclick="clearLeave('${e.id}')">Clear Leave</button>
        </td>
      </tr>
    `;
  });
}

async function loadQueue() {
  const res = await fetch("/api/queue");
  const queue = await res.json();

  const table = document.getElementById("queueTable");
  table.innerHTML = "";

  queue.forEach(e => {
    table.innerHTML += `
      <tr>
        <td>${e.id}</td>
        <td>${e.name}</td>
        <td>${e.skills}</td>
        <td class="${e.status}">${e.status}</td>
        <td>${e.reason}</td>
      </tr>
    `;
  });
}

async function addEngineer() {
  await fetch("/api/engineers", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      skills: document.getElementById("skills").value
    })
  });

  loadEngineers();
  loadQueue();
}

async function assignProject() {
  const id = document.getElementById("assignId").value;

  await fetch(`/api/assign/${id}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      projectName: document.getElementById("projectName").value,
      pmName: document.getElementById("pmName").value,
      leadName: document.getElementById("leadName").value,
      startDate: document.getElementById("startDate").value,
      endDate: document.getElementById("endDate").value
    })
  });

  loadEngineers();
  loadQueue();
}

async function markLeave() {
  const id = document.getElementById("leaveId").value;

  await fetch(`/api/leave/${id}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      leaveFrom: document.getElementById("leaveFrom").value,
      leaveTo: document.getElementById("leaveTo").value
    })
  });

  loadEngineers();
  loadQueue();
}

async function clearProject(id) {
  await fetch(`/api/clear-project/${id}`, {
    method: "POST"
  });

  loadEngineers();
  loadQueue();
}

async function clearLeave(id) {
  await fetch(`/api/clear-leave/${id}`, {
    method: "POST"
  });

  loadEngineers();
  loadQueue();
}

loadEngineers();
loadQueue();
</script>

</body>
</html>
